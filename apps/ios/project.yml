name: ServerBee
options:
  bundleIdPrefix: com.serverbee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: en
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  ServerBee:
    type: application
    platform: iOS
    sources:
      - path: ServerBee
    settings:
      base:
        INFOPLIST_FILE: ServerBee/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.serverbee.mobile
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: ServerBee/ServerBee.entitlements

  ServerBeeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ServerBeeTests
    dependencies:
      - target: ServerBee
    settings:
      base:
        INFOPLIST_FILE: ServerBeeTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.serverbee.mobile.tests
        GENERATE_INFOPLIST_FILE: NO
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ServerBee.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ServerBee"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
schemes:
  ServerBee:
    build:
      targets:
        ServerBee: all
        ServerBeeTests: [test]
    test:
      targets:
        - ServerBeeTests
      gatherCoverageData: true
