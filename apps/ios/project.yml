name: ServerBee
options:
  bundleIdPrefix: com.zingerbee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
targets:
  ServerBee:
    type: application
    platform: iOS
    sources:
      - path: ServerBee
    resources:
      - path: ServerBee/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zingerbee.serverbee
      INFOPLIST_FILE: ServerBee/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: false
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      SWIFT_EMIT_LOC_STRINGS: "YES"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
