# apps/ios/.swiftlint.yml
# Minimal opinionated rule set for ServerBee iOS.
# Run automatically by the SwiftLintBuildToolPlugin during every Xcode build.

included:
  - ServerBee
  - ServerBeeTests

excluded:
  - ServerBee/Preview Content

disabled_rules:
  - trailing_whitespace        # noisy on intentionally blank lines
  - todo                       # we allow TODO comments in WIP branches
  - opening_brace              # conflicts with SwiftUI builder formatting
  # `merge(from:)` on ServerStatus is intentionally a long if-let chain that
  # mirrors the field list of the model — refactoring it into a reflection-
  # based pipeline would obscure intent. AuthViewModel.login is a single
  # switch over HTTP status codes that's easier to read inline.
  - cyclomatic_complexity
  # SwiftUI's ViewBuilder DSL routinely uses multi-line closures with the
  # parameter on the next line for readability; this rule disagrees.
  - closure_parameter_position

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping           # warn on `!` so we audit each occurrence
  - first_where
  - last_where
  - sorted_first_last

analyzer_rules:
  - unused_import              # requires `swiftlint analyze`, not lint

line_length:
  warning: 200
  error: 300
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1                 # accommodate Swift idioms like `x`, `i`, `id`
  max_length:
    warning: 50
    error: 60

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 80
  error: 150

file_length:
  warning: 500
  error: 1000
