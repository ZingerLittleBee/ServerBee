name: CI iOS

on:
  push:
    branches: [main]
    paths:
      - 'apps/ios/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ios/**'

jobs:
  build:
    name: iOS Build
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - uses: xavierLowmiller/xcodegen-action@1.2.4
        with:
          spec: apps/ios/project.yml
          use-cache: true

      - uses: mxcl/xcodebuild@v3
        with:
          platform: iOS
          scheme: ServerBee
          action: build
          working-directory: apps/ios
