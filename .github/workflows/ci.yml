name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'
      - 'apps/ios/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'
      - 'apps/ios/**'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: apps/web
        run: bun install --frozen-lockfile && bun run build

      - name: Cargo check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: apps/web
        run: bun run tsc -b

      - name: Lint
        run: bun x ultracite check

  install-script:
    name: Install Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dash & shellcheck
        run: sudo apt-get update && sudo apt-get install -y dash shellcheck

      - name: POSIX syntax check (dash -n)
        run: dash -n deploy/install.sh

      - name: Portability lint (shellcheck --shell=dash)
        run: shellcheck --shell=dash --severity=warning deploy/install.sh
