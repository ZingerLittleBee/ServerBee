services:
  serverbee:
    build: .
    image: ghcr.io/zingerbee/serverbee:latest
    ports:
      - "9527:9527"
    volumes:
      - serverbee-data:/data
    environment:
      - SERVERBEE_ADMIN_USERNAME=admin
      - SERVERBEE_ADMIN_PASSWORD=changeme
    restart: unless-stopped

volumes:
  serverbee-data:
