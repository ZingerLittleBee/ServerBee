services:
  serverbee-server:
    image: ghcr.io/zingerlittlebee/serverbee-server:latest
    container_name: serverbee-server
    ports:
      - "9527:9527"
    volumes:
      - serverbee-data:/data
    # On first start the server auto-creates an admin account with a random
    # password printed once to the container logs (look for the highlighted
    # credentials banner: `docker compose logs serverbee-server`). You must
    # change this password on first login and may optionally pick a new username.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9527/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  serverbee-data:
